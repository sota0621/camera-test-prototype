<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黄緑色マーカー検出（長時間録画・IndexedDB堅牢版）</title>
    <link rel="stylesheet" href="style.css">
    <script async src="https://cdnjs.cloudflare.com/ajax/libs/opencv.js/4.10.0/opencv.js" id="opencv-src" crossorigin="anonymous"></script>
</head>
<body>

    <div id="status">OpenCV.jsを読み込んでいます...</div>
    
    <div class="container">
        <video id="camera-view" autoplay playsinline muted></video>
        <canvas id="canvas-output"></canvas>
    </div>

    <div class="btn-container">
        <button id="start-btn" class="btn" disabled>システム開始</button>
        <button id="stop-record-btn" class="btn">⏹ 録画を停止して終了</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
